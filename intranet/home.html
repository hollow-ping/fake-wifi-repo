<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Intranet</title>
    <style>
        /* Retro pixel intranet theme - Green terminal/8-bit aesthetic */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background: #0d2818;
            color: #39ff14;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #39ff14;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        h1 {
            color: #39ff14;
            text-shadow: 0 0 10px #39ff14;
            margin: 0;
        }
        .welcome {
            margin: 1rem 0;
            font-size: 1.1rem;
        }
        .logout-btn {
            padding: 0.5rem 1rem;
            background: rgba(57, 255, 20, 0.1);
            border: 2px solid #39ff14;
            color: #39ff14;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }
        .logout-btn:hover {
            background: rgba(57, 255, 20, 0.3);
            box-shadow: 0 0 10px #39ff14;
        }
        .message-board {
            margin: 2rem 0;
        }
        .post-form {
            background: rgba(57, 255, 20, 0.05);
            border: 2px solid #39ff14;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .post-form textarea {
            width: 100%;
            min-height: 100px;
            background: #0d2818;
            border: 1px solid #39ff14;
            color: #39ff14;
            font-family: 'Courier New', monospace;
            padding: 0.5rem;
            box-sizing: border-box;
            resize: vertical;
        }
        .post-form button {
            margin-top: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(57, 255, 20, 0.1);
            border: 2px solid #39ff14;
            color: #39ff14;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        .post-form button:hover {
            background: rgba(57, 255, 20, 0.3);
        }
        .posts {
            margin-top: 2rem;
        }
        .post {
            background: rgba(57, 255, 20, 0.05);
            border: 1px solid #39ff14;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .post-author-label {
            font-size: 0.85rem;
            font-weight: bold;
            text-align: left;
            margin-bottom: 0.4rem;
            opacity: 0.9;
        }
        .post-content {
            margin: 0 0 0.5rem 0;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .post-meta {
            margin-top: 0.4rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LOCAL INTRANET</h1>
            <a href="/index.html" class="logout-btn">Logout</a>
        </div>
        <div class="welcome" id="welcome">Welcome, User</div>
        
        <div class="message-board">
            <div class="post-form">
                <h2 style="margin-top: 0;">New Post</h2>
                <div class="post-author-label" id="postingAs">[Playa Name]:</div>
                <textarea id="postText" placeholder="What's on your mind?"></textarea>
                <button onclick="createPost()">Post</button>
            </div>

            <div class="posts" id="posts">
                <div class="empty-state">No posts yet. Be the first to post!</div>
            </div>
        </div>
    </div>
    
    <script src="../js/main.js"></script>
    <script>
        function formatDate(ts) {
            const d = new Date(ts);
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const yy = String(d.getFullYear()).slice(-2);
            let h = d.getHours();
            const m = String(d.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12; if (h === 0) h = 12;
            return `${mm}/${dd}/${yy} ${h}:${m} ${ampm}`;
        }
        function metaLine(ts) {
            return `${formatDate(ts)} -- PDF 2026`;
        }

        async function fetchPosts() {
            try {
                const r = await fetch('/api/posts', { cache: 'no-store' });
                if (!r.ok) throw new Error('bad status');
                const data = await r.json();
                return Array.isArray(data) ? data : [];
            } catch (e) {
                return null;
            }
        }

        function renderPosts(allPosts) {
            const postsContainer = document.getElementById('posts');
            postsContainer.innerHTML = '';

            if (allPosts === null) {
                const err = document.createElement('div');
                err.className = 'empty-state';
                err.textContent = "Couldn't reach the board. Try again in a sec.";
                postsContainer.appendChild(err);
                return;
            }

            const visible = allPosts
                .filter(p => !p.archived)
                .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            if (visible.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'No posts yet. Be the first to post!';
                postsContainer.appendChild(empty);
                return;
            }

            visible.forEach((post) => {
                const postDiv = document.createElement('div');
                postDiv.className = 'post';

                const authorLabel = document.createElement('div');
                authorLabel.className = 'post-author-label';
                authorLabel.textContent = `${post.author}:`;

                const contentDiv = document.createElement('div');
                contentDiv.className = 'post-content';
                contentDiv.textContent = post.content;

                const metaDiv = document.createElement('div');
                metaDiv.className = 'post-meta';
                metaDiv.textContent = metaLine(post.timestamp);

                postDiv.appendChild(authorLabel);
                postDiv.appendChild(contentDiv);
                postDiv.appendChild(metaDiv);
                postsContainer.appendChild(postDiv);
            });
        }

        async function loadPosts() {
            const data = await fetchPosts();
            renderPosts(data);
        }

        async function createPost() {
            const textarea = document.getElementById('postText');
            const content = textarea.value.trim();
            if (!content) return;
            try {
                const r = await fetch('/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author: getBurnerName(), content })
                });
                if (!r.ok) throw new Error('bad status');
                textarea.value = '';
                loadPosts();
            } catch (e) {
                alert("Couldn't post. Try again in a sec.");
            }
        }

        (async function init() {
            const valid = await verifyBurnerCookie();
            if (!valid) {
                clearBurnerCookie();
                window.location.href = '../index.html';
                return;
            }
            const name = getBurnerName();
            document.getElementById('welcome').textContent = `Welcome, ${name}`;
            document.getElementById('postingAs').textContent = `${name}:`;
            loadPosts();
            setInterval(loadPosts, 5000);
        })();

        document.getElementById('postText').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                createPost();
            }
        });
    </script>
</body>
</html>
