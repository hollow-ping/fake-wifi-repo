<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account: password</title>
    <style>
        /* Corporate auth portal theme - Clean blue/white */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0f6da;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #189385;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .password-wrapper {
            position: relative;
        }
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            padding-right: 3rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 0.5rem;
            bottom: 0.5rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            margin: auto 0;
        }
        .toggle-password:hover {
            color: #189385;
        }
        .eye-icon {
            width: 22px;
            height: 14px;
            border: 2px solid currentColor;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
            display: block;
            flex-shrink: 0;
        }
        .eye-icon::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: currentColor;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #189385;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        button:hover {
            background: #157a6d;
        }
        .validation-list {
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .validation-item {
            display: flex;
            align-items: center;
            font-size: 0.875rem;
            margin: 0.5rem 0;
            min-height: 1.5rem;
        }
        .validation-icon {
            width: 18px;
            height: 18px;
            margin-right: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .validation-icon.check {
            color: #28a745;
        }
        .validation-icon.x {
            color: #dc3545;
        }
        .validation-text {
            flex: 1;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            margin-bottom: 0;
            text-align: left;
        }
        input.error {
            border-color: #dc3545;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(224, 246, 218, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-content {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 300px;
        }
        .spinner {
            border: 4px solid #e0f6da;
            border-top: 4px solid #189385;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-message {
            color: #189385;
            font-size: 1.1rem;
            font-weight: 500;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Password</h1>
        <form id="passwordForm" autocomplete="off">
            <label>Password:</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="user-password" autocomplete="new-password" data-1p-ignore="true" data-lpignore="true" data-form-type="other" spellcheck="false" required>
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                    <span class="eye-icon"></span>
                </button>
            </div>
            <div id="validationList" class="validation-list"></div>
            
            <button type="submit" id="createBtn">Create Account</button>
            <div id="formError" class="error-message"></div>
        </form>
    </div>
    
    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="loading-message" id="loadingMessage">Creating Account...</p>
        </div>
    </div>
    
    <script src="../js/main.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const validationList = document.getElementById('validationList');
        const formError = document.getElementById('formError');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingMessage = document.getElementById('loadingMessage');

        // Funny password requirements (progressive)
        const requirements = [
            { check: (pwd) => pwd.length >= 8, text: 'Must be at least 8 characters' },
            { check: (pwd) => /[^a-zA-Z0-9]/.test(pwd), text: 'Must contain at least one special character' },
            { check: (pwd) => (pwd.match(/[A-Z]/g) || []).length === 1, text: 'Must contain one uppercase letter', dynamicText: (pwd) => (pwd.match(/[A-Z]/g) || []).length >= 2 ? 'Must contain ONE uppercase letter' : 'Must contain one uppercase letter' },
            { check: (pwd) => (pwd.match(/\d/g) || []).length >= 2, text: 'Must contain at least two numbers' },
            { 
                check: (pwd) => {
                    const digits = (pwd.match(/\d/g) || []);
                    const sum = digits.reduce((acc, d) => acc + Number(d), 0);
                    return sum === 9;
                }, 
                text: 'Numbers must add up to 9' 
            },
            { check: (pwd) => /\d5\b|\b5\d|\d5\d|\d+5$/.test(pwd), text: 'Must end in the number 5' },
            { check: (pwd) => pwd.length < 12, text: 'Must be less than 12 characters' }
        ]; 

        let visibleRequirements = 1; // Start with 1 requirement visible
        let validationShown = false; // Track if validation has been shown
        let firstValidationFailure = true; // Track first validation failure

        // Create validation list items
        function createValidationList() {
            const password = passwordInput.value;
            validationList.innerHTML = '';
            for (let i = 0; i < visibleRequirements && i < requirements.length; i++) {
                const req = requirements[i];
                const displayText = req.dynamicText ? req.dynamicText(password) : req.text;
                const item = document.createElement('div');
                item.className = 'validation-item';
                item.id = `validation-${i}`;
                item.innerHTML = `
                    <span class="validation-icon x" id="icon-${i}">✗</span>
                    <span class="validation-text" id="text-${i}">${displayText}</span>
                `;
                validationList.appendChild(item);
            }
        }

        // Check password against requirements (just updates UI, doesn't increment)
        function validatePassword(password, updateDynamicText = false) {
            let allPassed = true;

            for (let i = 0; i < visibleRequirements && i < requirements.length; i++) {
                const req = requirements[i];
                const passed = req.check(password);
                const icon = document.getElementById(`icon-${i}`);
                const textEl = document.getElementById(`text-${i}`);

                if (updateDynamicText && textEl && req.dynamicText) {
                    textEl.textContent = req.dynamicText(password);
                }

                if (icon) {
                    if (passed) {
                        icon.className = 'validation-icon check';
                        icon.textContent = '✓';
                    } else {
                        icon.className = 'validation-icon x';
                        icon.textContent = '✗';
                        allPassed = false;
                    }
                }
            }

            return allPassed;
        }

        // Check if all visible requirements are met and increment if needed
        function checkAndIncrementRequirements(password) {
            // First, check all visible requirements
            let allVisiblePassed = true;
            for (let i = 0; i < visibleRequirements && i < requirements.length; i++) {
                if (!requirements[i].check(password)) {
                    allVisiblePassed = false;
                    break;
                }
            }

            // If all visible are passed, check ahead to see how many more are already satisfied
            if (allVisiblePassed && visibleRequirements < requirements.length) {
                // Find the first unsatisfied requirement
                let nextUnsatisfied = visibleRequirements;
                for (let i = visibleRequirements; i < requirements.length; i++) {
                    if (requirements[i].check(password)) {
                        nextUnsatisfied = i + 1;
                    } else {
                        break;
                    }
                }
                
                // Increment to show the next unsatisfied requirement (or all if all are satisfied)
                visibleRequirements = Math.min(nextUnsatisfied + 1, requirements.length);
                createValidationList();
                validatePassword(password);
                
                // Re-check all visible requirements after incrementing
                allVisiblePassed = true;
                for (let i = 0; i < visibleRequirements && i < requirements.length; i++) {
                    if (!requirements[i].check(password)) {
                        allVisiblePassed = false;
                        break;
                    }
                }
            }

            return visibleRequirements === requirements.length && allVisiblePassed;
        }

        // Toggle password visibility
        togglePassword.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePassword.setAttribute('aria-label', 'Hide password');
            } else {
                passwordInput.type = 'password';
                togglePassword.setAttribute('aria-label', 'Show password');
            }
        });

        // Validate as user types (only if validation has been shown)
        passwordInput.addEventListener('input', function() {
            const password = passwordInput.value;
            formError.textContent = '';
            passwordInput.classList.remove('error');
            if (validationShown) {
                validatePassword(password);
            }
        });

        // Form submission
        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = passwordInput.value;
            
            // Clear previous errors
            formError.textContent = '';
            passwordInput.classList.remove('error');
            
            // Basic validation
            if (!password) {
                // Show validation for the first time
                if (!validationShown) {
                    validationShown = true;
                    createValidationList();
                    validatePassword(password);
                }
                formError.textContent = 'Please review your answers and try again';
                passwordInput.classList.add('error');
                // Show password on first validation failure
                if (firstValidationFailure) {
                    passwordInput.type = 'text';
                    togglePassword.setAttribute('aria-label', 'Hide password');
                    firstValidationFailure = false;
                }
                return;
            }
            
            // Show validation for the first time if not shown yet
            if (!validationShown) {
                validationShown = true;
                createValidationList();
                validatePassword(password);
            }
            
            // Check if all visible requirements are met and increment if needed
            const allPassed = checkAndIncrementRequirements(password);

            // Update UI for current visible requirements (including dynamic text)
            validatePassword(password, true);
            
            if (!allPassed) {
                formError.textContent = 'Please review your answers and try again';
                passwordInput.classList.add('error');
                // Show password on first validation failure
                if (firstValidationFailure) {
                    passwordInput.type = 'text';
                    togglePassword.setAttribute('aria-label', 'Hide password');
                    firstValidationFailure = false;
                }
                return;
            }
            
            // Ensure burner name is still saved (should be from previous screen)
            const burnerName = getBurnerNameDuringCreation();
            if (!burnerName || burnerName === "User") {
                // If somehow the name wasn't saved, redirect back
                window.location.href = 'start.html';
                return;
            }
            
            // Show loading screen with sequence
            loadingOverlay.classList.add('active');
            loadingMessage.textContent = 'Creating Account...';
            
            // After 2 seconds, show validation error message
            setTimeout(() => {
                loadingMessage.textContent = 'Validation Error : Redirecting...';
                
                // After 4 more seconds (6 total), redirect to error page
                setTimeout(() => {
                    window.location.href = 'error.html';
                }, 4000);
            }, 2000);
        });
    </script>
</body>
</html>
