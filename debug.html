<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Tool - BURNERNET</title>
    <style>
        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #fff;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #ff6b35;
            border-bottom: 2px solid #ff6b35;
            padding-bottom: 0.5rem;
        }
        .section {
            background: #252526;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 5px;
            border: 1px solid #3e3e42;
        }
        .section h2 {
            color: #569cd6;
            margin-top: 0;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .info-label {
            color: #858585;
        }
        .info-value {
            color: #4EC9B0;
            font-weight: bold;
            word-break: break-all;
        }
        .info-value.none {
            color: #f48771;
        }
        .info-value.temp {
            color: #ff9800;
        }
        .info-value.perm {
            color: #4CAF50;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        button {
            padding: 0.75rem 1.5rem;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
        button:hover {
            background: #1177bb;
        }
        button.danger {
            background: #a1260d;
        }
        button.danger:hover {
            background: #c72e0f;
        }
        button.success {
            background: #0e7c0e;
        }
        button.success:hover {
            background: #0f9d0f;
        }
        input[type="text"] {
            padding: 0.5rem;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #fff;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            width: 200px;
        }
        .state-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 3px;
            font-weight: bold;
            margin-left: 0.5rem;
        }
        .state-badge.newDevice {
            background: #f48771;
            color: #1a1a1a;
        }
        .state-badge.hasAccount {
            background: #ff9800;
            color: #1a1a1a;
        }
        .links {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #3e3e42;
        }
        .links a {
            color: #569cd6;
            text-decoration: none;
            margin-right: 1rem;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .storage-list {
            background: #1e1e1e;
            padding: 1rem;
            border-radius: 3px;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .storage-item {
            padding: 0.25rem 0;
            border-bottom: 1px solid #3e3e42;
        }
        .storage-key {
            color: #569cd6;
        }
        .storage-value {
            color: #4EC9B0;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐛 Debug Tool</h1>
        
        <div class="section">
            <h2>Account State</h2>
            <div class="info-grid">
                <div class="info-label">Device State:</div>
                <div class="info-value" id="current-state">-</div>
                
                <div class="info-label">tempBurnerName:</div>
                <div class="info-value" id="temp-name">-</div>
                
                <div class="info-label">burnerName (cookie):</div>
                <div class="info-value" id="perm-name">-</div>
                
                <div class="info-label">Has Account:</div>
                <div class="info-value" id="has-account">-</div>
            </div>
            <button onclick="refreshInfo()">🔄 Refresh</button>
        </div>
        
        <div class="section">
            <h2>Username Management</h2>
            <div class="button-group">
                <button class="danger" onclick="clearTempName()">Clear Temp Name</button>
                <button class="danger" onclick="clearPermName()">Clear Cookie</button>
                <button class="danger" onclick="clearBothNames()">Clear Both</button>
            </div>
            <div style="margin-top: 1rem;">
                <input type="text" id="custom-temp-name" placeholder="Set temp name...">
                <button onclick="setTempName()">Set Temp</button>
            </div>
            <div style="margin-top: 0.5rem;">
                <input type="text" id="custom-perm-name" placeholder="Set cookie name...">
                <button onclick="setPermName()">Set Cookie</button>
            </div>
            <div style="margin-top: 0.5rem;">
                <button class="success" onclick="commitTempToPerm()">Commit Temp → Cookie</button>
            </div>
        </div>
        
        <div class="section">
            <h2>Quick States</h2>
            <div class="button-group">
                <button class="success" onclick="setNewDevice()">New Device</button>
                <button class="success" onclick="setHasAccount()">Has Account</button>
                <button class="danger" onclick="clearAll()">Clear All Storage</button>
            </div>
        </div>
        
        <div class="section">
            <h2>Intranet Data</h2>
            <div class="info-grid">
                <div class="info-label">Posts Count:</div>
                <div class="info-value" id="posts-count">-</div>
            </div>
            <div class="button-group">
                <button class="danger" onclick="clearIntranetPosts()">Clear All Posts</button>
            </div>
        </div>
        
        <div class="section">
            <h2>All LocalStorage</h2>
            <div class="storage-list" id="storage-list">-</div>
            <button onclick="refreshStorage()" style="margin-top: 0.5rem;">Refresh Storage</button>
        </div>
        
        <div class="section">
            <h2>Navigation</h2>
            <div class="links">
                <a href="/">Home (index.html)</a>
                <a href="/create-account/start.html">Create Account</a>
                <a href="/login.html">Login</a>
                <a href="/connect/go.html">Connect: Go</a>
                <a href="/intranet/home.html">Intranet</a>
                <a href="/verify/captcha_xr5u.html">Captcha 1</a>
                <a href="/verify/captcha_y2qu.html">Captcha 2</a>
            </div>
        </div>
    </div>
    
    <script src="js/main.js"></script>
    <script>
        function refreshInfo() {
            // Get device state
            const permName = localStorage.getItem('burnerName');
            const tempName = localStorage.getItem('tempBurnerName');
            const hasAccount = permName !== null;
            
            let state = 'newDevice';
            if (hasAccount) state = 'hasAccount';
            
            const stateEl = document.getElementById('current-state');
            stateEl.textContent = state;
            stateEl.className = 'info-value state-badge ' + state;
            
            // Get temp name
            const tempEl = document.getElementById('temp-name');
            tempEl.textContent = tempName || 'none';
            tempEl.className = tempName ? 'info-value temp' : 'info-value none';
            
            // Get perm name (cookie)
            const permEl = document.getElementById('perm-name');
            permEl.textContent = permName || 'none';
            permEl.className = permName ? 'info-value perm' : 'info-value none';
            
            // Has account
            const accountEl = document.getElementById('has-account');
            accountEl.textContent = hasAccount ? 'true' : 'false';
            accountEl.className = 'info-value ' + (hasAccount ? 'true' : 'false');
            
            // Posts count
            try {
                const posts = JSON.parse(localStorage.getItem('intranetPosts') || '[]');
                document.getElementById('posts-count').textContent = posts.length;
            } catch (e) {
                document.getElementById('posts-count').textContent = '0';
            }
        }
        
        function refreshStorage() {
            const list = document.getElementById('storage-list');
            list.innerHTML = '';
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                const item = document.createElement('div');
                item.className = 'storage-item';
                item.innerHTML = `<span class="storage-key">${key}:</span><span class="storage-value">${value}</span>`;
                list.appendChild(item);
            }
            
            if (localStorage.length === 0) {
                list.innerHTML = '<div style="color: #858585;">No localStorage items</div>';
            }
        }
        
        function clearTempName() {
            localStorage.removeItem('tempBurnerName');
            refreshInfo();
            alert('tempBurnerName cleared!');
        }
        
        function clearPermName() {
            localStorage.removeItem('burnerName');
            refreshInfo();
            alert('burnerName (cookie) cleared!');
        }
        
        function clearBothNames() {
            localStorage.removeItem('tempBurnerName');
            localStorage.removeItem('burnerName');
            refreshInfo();
            alert('Both names cleared!');
        }
        
        function setTempName() {
            const name = document.getElementById('custom-temp-name').value.trim();
            if (name) {
                setTempBurnerName(name);
                refreshInfo();
                alert(`Temp name set to: ${name}`);
                document.getElementById('custom-temp-name').value = '';
            } else {
                alert('Please enter a name');
            }
        }
        
        function setPermName() {
            const name = document.getElementById('custom-perm-name').value.trim();
            if (name) {
                setBurnerName(name);
                refreshInfo();
                alert(`Cookie set to: ${name}`);
                document.getElementById('custom-perm-name').value = '';
            } else {
                alert('Please enter a name');
            }
        }
        
        function commitTempToPerm() {
            const committed = commitBurnerName();
            if (committed) {
                refreshInfo();
                alert(`Committed temp name to cookie: ${committed}`);
            } else {
                alert('No temp name to commit!');
            }
        }
        
        function setNewDevice() {
            localStorage.removeItem('tempBurnerName');
            localStorage.removeItem('burnerName');
            refreshInfo();
            refreshStorage();
            alert('Set to: New Device (all names cleared)');
        }
        
        function setHasAccount() {
            setBurnerName('TestUser');
            localStorage.removeItem('tempBurnerName');
            refreshInfo();
            refreshStorage();
            alert('Set to: Has Account (TestUser)');
        }
        
        function clearAll() {
            if (confirm('Clear ALL localStorage? This will reset everything.')) {
                localStorage.clear();
                refreshInfo();
                refreshStorage();
                alert('All localStorage cleared!');
            }
        }
        
        function clearIntranetPosts() {
            if (confirm('Clear all intranet posts?')) {
                localStorage.removeItem('intranetPosts');
                refreshInfo();
                alert('Intranet posts cleared!');
            }
        }
        
        // Initial load
        refreshInfo();
        refreshStorage();
        
        // Auto-refresh every 3 seconds
        setInterval(() => {
            refreshInfo();
        }, 3000);
    </script>
</body>
</html>
