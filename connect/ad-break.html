<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect: Ad Break</title>
    <style>
        /* Burner ticket queue theme - Orange/red ticket site aesthetic */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
        }
        .ad-content {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 8px;
            margin: 2rem 0;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .skip-button {
            margin-top: 2rem;
        }
        button {
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        button:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BURNERNET AUTH QUEUE</h1>
        <div class="ad-content">
            <div>Watch this ad to continue...</div>
        </div>
        <div class="skip-button">
            <button onclick="window.location.href='sparkle-pony.html'">Skip Ad</button>
        </div>
    </div>
    <script>
        // Auto-redirect after 3 seconds
        setTimeout(() => {
            window.location.href = 'sparkle-pony.html';
        }, 3000);
    </script>
</body>
</html>
