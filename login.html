<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        /* Corporate auth portal theme - Clean blue/white */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0f6da;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #189385;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #189385;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        button:hover {
            background: #157a6d;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            margin-bottom: 0;
            text-align: left;
        }
        input.error {
            border-color: #dc3545;
        }
        .create-account-link {
            text-align: center;
            margin-top: 1rem;
            color: #666;
            font-size: 0.9rem;
        }
        .create-account-link a {
            color: #189385;
            text-decoration: none;
        }
        .create-account-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <form id="loginForm">
            <label>Playa Name:</label>
            <input type="text" id="burnerName" autocomplete="off" data-1p-ignore="true" data-lpignore="true" data-form-type="other" required>
            
            <label>Password:</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="off" data-1p-ignore="true" data-lpignore="true" data-form-type="other" required>
            
            <button type="submit" id="loginBtn">Login</button>
            <div id="formError" class="error-message"></div>
            
            <div class="create-account-link">
                Don't have an account? <a href="create-account/start.html">Create Account</a>
            </div>
        </form>
    </div>
    
    <script src="js/main.js"></script>
    <script>
        (async function onLoad() {
            const burnerNameEl = document.getElementById('burnerName');
            const passwordEl = document.getElementById('password');
            const valid = await verifyBurnerCookie();
            const storedName = localStorage.getItem('burnerName');
            if (valid && storedName) {
                burnerNameEl.value = storedName;
                passwordEl.value = '********';
                setTimeout(() => {
                    window.location.href = 'connect/go.html';
                }, 500);
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const burnerNameEl = document.getElementById('burnerName');
            const passwordEl = document.getElementById('password');
            const formError = document.getElementById('formError');
            const burnerName = burnerNameEl.value.trim();
            const password = passwordEl.value;

            formError.textContent = '';
            burnerNameEl.classList.remove('error');
            passwordEl.classList.remove('error');

            if (!burnerName || !password) {
                formError.textContent = 'Please enter both Playa Name and password';
                if (!burnerName) burnerNameEl.classList.add('error');
                if (!password) passwordEl.classList.add('error');
                return;
            }

            const valid = await verifyBurnerCookie();
            const storedName = localStorage.getItem('burnerName');
            if (valid && storedName && storedName === burnerName) {
                window.location.href = 'login-success.html';
            } else {
                formError.textContent = 'Invalid';
                burnerNameEl.classList.add('error');
                passwordEl.classList.add('error');
            }
        });
    </script>
</body>
</html>
