<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d1992</title>
    <style>
        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #ccc;
            line-height: 1.6;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { color: #ff6b35; border-bottom: 2px solid #ff6b35; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
        h2 { color: #569cd6; margin: 0 0 1rem 0; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
        .section {
            background: #252526;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            border: 1px solid #3e3e42;
        }
        .state-row {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 0.4rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .label { color: #858585; }
        .val { color: #4EC9B0; font-weight: bold; word-break: break-all; }
        .val.none { color: #f48771; }
        .val.temp { color: #ff9800; }
        .btns { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        button {
            padding: 0.5rem 1rem;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        button:hover { background: #1177bb; }
        button.danger { background: #a1260d; }
        button.danger:hover { background: #c72e0f; }
        button.sm { padding: 0.2rem 0.6rem; font-size: 0.75rem; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 0.5rem 1.25rem; }
        .nav-links a { color: #569cd6; text-decoration: none; font-size: 0.9rem; }
        .nav-links a:hover { text-decoration: underline; }

        .post-row {
            border-bottom: 1px solid #3e3e42;
            padding: 0.6rem 0;
            font-size: 0.85rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .post-row:last-child { border-bottom: none; }
        .post-row.archived { opacity: 0.5; }
        .post-meta { color: #858585; white-space: nowrap; min-width: 90px; }
        .post-body { flex: 1; color: #ccc; word-break: break-word; }
        .post-author { color: #4EC9B0; font-weight: bold; }
        .post-replies { color: #858585; font-size: 0.8rem; margin-top: 0.2rem; }

        .archive-divider {
            border-top: 1px solid #3e3e42;
            margin: 1rem 0 0.75rem;
            font-size: 0.8rem;
            color: #858585;
            padding-top: 0.75rem;
        }

        .seed-form {
            border-top: 1px solid #3e3e42;
            margin-top: 1rem;
            padding-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .seed-form input, .seed-form textarea {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #ccc;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 0.4rem 0.6rem;
            border-radius: 3px;
            width: 100%;
            box-sizing: border-box;
        }
        .seed-form textarea { min-height: 60px; resize: vertical; }
        .empty { color: #858585; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>d1992</h1>

        <div class="section">
            <h2>State</h2>
            <div class="state-row">
                <span class="label">Device state</span><span class="val" id="st-state">-</span>
                <span class="label">burnerName</span><span class="val" id="st-perm">-</span>
                <span class="label">tempBurnerName</span><span class="val" id="st-temp">-</span>
                <span class="label">Intranet posts</span><span class="val" id="st-posts">-</span>
                <span class="label">Archived posts</span><span class="val" id="st-archive">-</span>
            </div>
            <div class="btns">
                <button onclick="refresh()">Refresh</button>
                <button class="danger" onclick="resetNewDevice()">Reset → New Device</button>
                <button class="danger" onclick="clearAll()">Clear All Storage</button>
            </div>
        </div>

        <div class="section">
            <h2>Intranet Board</h2>
            <div class="btns" style="margin-bottom: 1rem;">
                <button class="danger" onclick="archiveAll()">Archive All Posts</button>
            </div>
            <div id="post-list"><span class="empty">No posts.</span></div>
            <div id="archive-section" style="display:none;">
                <div class="archive-divider" id="archive-label"></div>
                <div id="archive-list"></div>
            </div>
            <div class="seed-form">
                <span style="color: #858585; font-size: 0.8rem;">Seed a post</span>
                <input type="text" id="seed-author" placeholder="Author name...">
                <textarea id="seed-content" placeholder="Post content..."></textarea>
                <div><button onclick="seedPost()">Add Post</button></div>
            </div>
        </div>

        <div class="section">
            <h2>Navigate</h2>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/create-account/start.html">Create Account</a>
                <a href="/login.html">Login</a>
                <a href="/verify/captcha.html">Captcha</a>
                <a href="/connect/go.html">Connect</a>
                <a href="/intranet/home.html">Intranet</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function getPosts()   { try { return JSON.parse(localStorage.getItem('intranetPosts')  || '[]'); } catch(e) { return []; } }
        function getArchive() { try { return JSON.parse(localStorage.getItem('archivedPosts')  || '[]'); } catch(e) { return []; } }
        function savePosts(p)   { localStorage.setItem('intranetPosts',  JSON.stringify(p)); }
        function saveArchive(a) { localStorage.setItem('archivedPosts', JSON.stringify(a)); }

        function refresh() {
            const perm = localStorage.getItem('burnerName');
            const temp = localStorage.getItem('tempBurnerName');

            document.getElementById('st-state').textContent = perm ? 'hasAccount' : 'newDevice';
            document.getElementById('st-state').className = 'val ' + (perm ? '' : 'none');

            const permEl = document.getElementById('st-perm');
            permEl.textContent = perm || 'none';
            permEl.className = 'val ' + (perm ? '' : 'none');

            const tempEl = document.getElementById('st-temp');
            tempEl.textContent = temp || 'none';
            tempEl.className = 'val ' + (temp ? 'temp' : 'none');

            const posts   = getPosts();
            const archive = getArchive();
            document.getElementById('st-posts').textContent   = posts.length;
            document.getElementById('st-archive').textContent = archive.length;

            renderPosts(posts);
            renderArchive(archive);
        }

        function makePostRow(post, btnLabel, btnClass, onClickFn) {
            const row = document.createElement('div');
            row.className = 'post-row' + (btnLabel === '↑' ? ' archived' : '');

            const meta = document.createElement('div');
            meta.className = 'post-meta';
            meta.textContent = new Date(post.timestamp).toLocaleDateString();

            const body = document.createElement('div');
            body.className = 'post-body';
            const author = document.createElement('span');
            author.className = 'post-author';
            author.textContent = post.author + ' ';
            const content = document.createElement('span');
            const preview = post.content.length > 80 ? post.content.slice(0, 80) + '…' : post.content;
            content.textContent = preview;
            body.appendChild(author);
            body.appendChild(content);
            if (post.replies && post.replies.length > 0) {
                const replies = document.createElement('div');
                replies.className = 'post-replies';
                replies.textContent = `↳ ${post.replies.length} repl${post.replies.length === 1 ? 'y' : 'ies'}`;
                body.appendChild(replies);
            }

            const btn = document.createElement('button');
            btn.className = btnClass + ' sm';
            btn.textContent = btnLabel;
            btn.onclick = onClickFn;

            row.appendChild(meta);
            row.appendChild(body);
            row.appendChild(btn);
            return row;
        }

        function renderPosts(posts) {
            const el = document.getElementById('post-list');
            if (posts.length === 0) {
                el.innerHTML = '<span class="empty">No posts.</span>';
                return;
            }
            el.innerHTML = '';
            posts.forEach((post, i) => {
                el.appendChild(makePostRow(post, '↓', 'danger', () => archivePost(i)));
            });
        }

        function renderArchive(archive) {
            const section = document.getElementById('archive-section');
            const label   = document.getElementById('archive-label');
            const list    = document.getElementById('archive-list');
            if (archive.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            label.textContent = `Archived (${archive.length})`;
            list.innerHTML = '';
            archive.forEach((post, i) => {
                list.appendChild(makePostRow(post, '↑', '', () => restorePost(i)));
            });
        }

        function archivePost(i) {
            const posts   = getPosts();
            const archive = getArchive();
            archive.unshift(posts.splice(i, 1)[0]);
            savePosts(posts);
            saveArchive(archive);
            refresh();
        }

        function restorePost(i) {
            const posts   = getPosts();
            const archive = getArchive();
            posts.unshift(archive.splice(i, 1)[0]);
            savePosts(posts);
            saveArchive(archive);
            refresh();
        }

        function archiveAll() {
            const posts   = getPosts();
            if (posts.length === 0) return;
            const archive = getArchive();
            saveArchive([...posts, ...archive]);
            savePosts([]);
            refresh();
        }

        function seedPost() {
            const author  = document.getElementById('seed-author').value.trim();
            const content = document.getElementById('seed-content').value.trim();
            if (!author || !content) return;
            const posts = getPosts();
            posts.unshift({ author, content, timestamp: Date.now(), replies: [] });
            savePosts(posts);
            document.getElementById('seed-author').value  = '';
            document.getElementById('seed-content').value = '';
            refresh();
        }

        function resetNewDevice() {
            localStorage.removeItem('tempBurnerName');
            clearBurnerCookie();
            refresh();
        }

        function clearAll() {
            if (confirm('Clear ALL localStorage?')) {
                localStorage.clear();
                refresh();
            }
        }

        refresh();
        setInterval(refresh, 3000);
    </script>
</body>
</html>
