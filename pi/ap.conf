# Fake WiFi — physical Wi-Fi used as the base for the uap0 virtual AP.
# start-ap.sh reads: /etc/fake-wifi/ap.conf
#
# AP_PHYS: real interface name (wlan0, wlan1, …) or "auto".
AP_PHYS=auto

# When AP_PHYS=auto:
#   usb     — prefer a USB Wi-Fi dongle if one shows up as wlan*
#   builtin — prefer built-in (SDIO) Wi-Fi, e.g. Pi Zero 2 W onboard
AP_PHYS_PREFER=usb

# Seconds to wait for a USB wlan to appear when AP_PHYS=auto + AP_PHYS_PREFER=usb
# Set to 0 to disable waiting (decide instantly with whatever is present).
AP_PHYS_WAIT_SECS=15
